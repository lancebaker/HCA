<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 72 72" width="64" height="64">
  <!-- Amber circle background -->
  <circle cx="32" cy="32" r="30" fill="#C8863A"/>
  <!-- Outer dashed ring -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#FAF4E8" stroke-width="1.2" stroke-dasharray="4 5"/>
  <!-- Mid ring -->
  <circle cx="32" cy="32" r="17" fill="none" stroke="#FAF4E8" stroke-width="1.2"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="9" fill="none" stroke="#FAF4E8" stroke-width="1"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2.5" fill="#FAF4E8"/>
  <!-- Cardinal radial lines -->
  <line x1="32" y1="8"  x2="32" y2="14" stroke="#FAF4E8" stroke-width="1.2"/>
  <line x1="32" y1="50" x2="32" y2="56" stroke="#FAF4E8" stroke-width="1.2"/>
  <line x1="8"  y1="32" x2="14" y2="32" stroke="#FAF4E8" stroke-width="1.2"/>
  <line x1="50" y1="32" x2="56" y2="32" stroke="#FAF4E8" stroke-width="1.2"/>
  <!-- Diagonal radial lines -->
  <line x1="14" y1="14" x2="19" y2="19" stroke="#FAF4E8" stroke-width="1" opacity="0.7"/>
  <line x1="45" y1="45" x2="50" y2="50" stroke="#FAF4E8" stroke-width="1" opacity="0.7"/>
  <line x1="50" y1="14" x2="45" y2="19" stroke="#FAF4E8" stroke-width="1" opacity="0.7"/>
  <line x1="14" y1="50" x2="19" y2="45" stroke="#FAF4E8" stroke-width="1" opacity="0.7"/>
</svg>
