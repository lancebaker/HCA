<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Amber circle with generous inset -->
  <circle cx="32" cy="32" r="28" fill="#C8863A"/>
  <!-- Outer dashed ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#FAF4E8" stroke-width="1.2" stroke-dasharray="4 5"/>
  <!-- Mid ring -->
  <circle cx="32" cy="32" r="15" fill="none" stroke="#FAF4E8" stroke-width="1.2"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="8" fill="none" stroke="#FAF4E8" stroke-width="1"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2.5" fill="#FAF4E8"/>
  <!-- Cardinal radial lines -->
  <line x1="32" y1="10" x2="32" y2="16" stroke="#FAF4E8" stroke-width="1.2"/>
  <line x1="32" y1="48" x2="32" y2="54" stroke="#FAF4E8" stroke-width="1.2"/>
  <line x1="10" y1="32" x2="16" y2="32" stroke="#FAF4E8" stroke-width="1.2"/>
  <line x1="48" y1="32" x2="54" y2="32" stroke="#FAF4E8" stroke-width="1.2"/>
  <!-- Diagonal radial lines -->
  <line x1="16" y1="16" x2="20" y2="20" stroke="#FAF4E8" stroke-width="1" opacity="0.7"/>
  <line x1="44" y1="44" x2="48" y2="48" stroke="#FAF4E8" stroke-width="1" opacity="0.7"/>
  <line x1="48" y1="16" x2="44" y2="20" stroke="#FAF4E8" stroke-width="1" opacity="0.7"/>
  <line x1="16" y1="48" x2="20" y2="44" stroke="#FAF4E8" stroke-width="1" opacity="0.7"/>
</svg>
